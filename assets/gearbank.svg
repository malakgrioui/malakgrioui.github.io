<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f0f"/>
      <stop offset="100%" style="stop-color:#0f2a1a"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="circleGrad" cx="50%" cy="30%" r="70%" fx="50%" fy="30%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#052e16"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#14532d" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative water/wave shapes (mangrove coast) -->
  <ellipse cx="600" cy="680" rx="700" ry="150" fill="#052e16" opacity="0.4"/>
  <ellipse cx="600" cy="700" rx="800" ry="180" fill="#0a3d1f" opacity="0.25"/>

  <!-- ===== TOP LABEL ===== -->
  <text x="600" y="52" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" opacity="0.45" letter-spacing="4">GEARBANK INITIATIVE · GLOBAL MANGROVE TRUST · NORTH SUMATRA</text>

  <!-- ===== LEFT: Women Cooperative icons ===== -->
  <g transform="translate(80, 150)">
    <!-- Circle backdrop -->
    <circle cx="100" cy="100" r="88" fill="#052e16" opacity="0.7" stroke="#16a34a" stroke-width="1.5"/>

    <!-- Woman figure 1 -->
    <circle cx="70" cy="72" r="14" fill="#16a34a" opacity="0.9"/>
    <rect x="58" y="86" width="24" height="38" rx="6" fill="#15803d" opacity="0.9"/>
    <text x="70" y="140" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">CEO</text>

    <!-- Woman figure 2 -->
    <circle cx="100" cy="65" r="14" fill="#22c55e" opacity="0.9"/>
    <rect x="88" y="79" width="24" height="38" rx="6" fill="#16a34a" opacity="0.9"/>
    <text x="100" y="133" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">COO</text>

    <!-- Woman figure 3 -->
    <circle cx="130" cy="72" r="14" fill="#16a34a" opacity="0.9"/>
    <rect x="118" y="86" width="24" height="38" rx="6" fill="#15803d" opacity="0.9"/>
    <text x="130" y="140" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">CFO</text>

    <!-- Label -->
    <text x="100" y="170" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="700">COOPERATIVE</text>
    <text x="100" y="184" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="9">Women Leaders</text>
  </g>

  <!-- Connection line left → center -->
  <line x1="268" y1="248" x2="368" y2="315" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="363,310 375,315 363,320" fill="#16a34a" opacity="0.5"/>

  <!-- ===== CENTER: Product/Activity hub ===== -->
  <g transform="translate(380, 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="440" height="210" rx="12" fill="#0a1e0e" stroke="#166534" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="0" y="0" width="440" height="38" rx="12" fill="#14532d" opacity="0.9"/>
    <rect x="0" y="20" width="440" height="18" fill="#14532d" opacity="0.9"/>
    <text x="220" y="24" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11" font-weight="700">PRODUCTION &amp; SALES TRACKER</text>

    <!-- Product rows -->
    <g font-family="monospace" font-size="9">
      <!-- Col headers -->
      <text x="14" y="56" fill="#4ade80" font-weight="700">Product</text>
      <text x="160" y="56" fill="#4ade80" font-weight="700">Village</text>
      <text x="265" y="56" fill="#4ade80" font-weight="700">Units/mo</text>
      <text x="358" y="56" fill="#4ade80" font-weight="700">Revenue</text>

      <!-- Divider -->
      <line x1="8" y1="60" x2="432" y2="60" stroke="#166534" stroke-width="0.5" opacity="0.5"/>

      <!-- Row 1 -->
      <rect x="8" y="63" width="424" height="24" rx="2" fill="#052e16" opacity="0.5"/>
      <text x="14" y="79" fill="#86efac">🦐 Shrimp Chips</text>
      <text x="160" y="79" fill="#6ee7b7">Sei Apung</text>
      <text x="265" y="79" fill="#34d399">240 pcs</text>
      <rect x="355" y="67" width="78" height="14" rx="3" fill="#14532d"/>
      <text x="394" y="78" text-anchor="middle" fill="#4ade80">IDR 2.4M</text>

      <!-- Row 2 -->
      <rect x="8" y="89" width="424" height="24" rx="2" fill="#0a1e0e" opacity="0.3"/>
      <text x="14" y="105" fill="#86efac">🧼 Mangrove Soap</text>
      <text x="160" y="105" fill="#6ee7b7">Bagan Deli</text>
      <text x="265" y="105" fill="#34d399">180 bars</text>
      <rect x="355" y="93" width="78" height="14" rx="3" fill="#14532d"/>
      <text x="394" y="104" text-anchor="middle" fill="#4ade80">IDR 1.8M</text>

      <!-- Row 3 -->
      <rect x="8" y="115" width="424" height="24" rx="2" fill="#052e16" opacity="0.5"/>
      <text x="14" y="131" fill="#86efac">🥟 Dim Sum</text>
      <text x="160" y="131" fill="#6ee7b7">Percut</text>
      <text x="265" y="131" fill="#34d399">320 pcs</text>
      <rect x="355" y="119" width="78" height="14" rx="3" fill="#14532d"/>
      <text x="394" y="130" text-anchor="middle" fill="#4ade80">IDR 3.2M</text>

      <!-- Row 4 -->
      <rect x="8" y="141" width="424" height="24" rx="2" fill="#0a1e0e" opacity="0.3"/>
      <text x="14" y="157" fill="#86efac">🌿 Mangrove Snacks</text>
      <text x="160" y="157" fill="#6ee7b7">Pantai Labu</text>
      <text x="265" y="157" fill="#fbbf24">90 pcs</text>
      <rect x="355" y="145" width="78" height="14" rx="3" fill="#14532d"/>
      <text x="394" y="156" text-anchor="middle" fill="#4ade80">IDR 0.9M</text>

      <!-- Fade -->
      <rect x="8" y="165" width="424" height="40" fill="url(#bg)" opacity="0.85"/>
      <text x="220" y="192" text-anchor="middle" fill="#166534" font-size="10" opacity="0.6">··· more products ···</text>
    </g>
  </g>

  <!-- ===== RIGHT: Monitoring stack ===== -->
  <g transform="translate(880, 150)">
    <!-- KoboToolbox panel -->
    <rect x="0" y="0" width="200" height="78" rx="8" fill="#0a1e0e" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="28" rx="8" fill="#14532d"/>
    <rect x="0" y="14" width="200" height="14" fill="#14532d"/>
    <text x="100" y="20" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10" font-weight="700">KoboToolbox</text>
    <g font-family="monospace" font-size="8" fill="#4ade80">
      <text x="14" y="44">▸ Field surveys</text>
      <text x="14" y="57">▸ Participant data</text>
      <text x="14" y="70">▸ Village reports</text>
    </g>

    <!-- Connector line -->
    <line x1="100" y1="78" x2="100" y2="108" stroke="#16a34a" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
    <circle cx="100" cy="108" r="3" fill="#16a34a" opacity="0.6"/>

    <!-- Airtable panel -->
    <rect x="0" y="110" width="200" height="78" rx="8" fill="#0a1e0e" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="110" width="200" height="28" rx="8" fill="#166534"/>
    <rect x="0" y="124" width="200" height="14" fill="#166534"/>
    <text x="100" y="130" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10" font-weight="700">Airtable</text>
    <g font-family="monospace" font-size="8" fill="#4ade80">
      <text x="14" y="154">▸ Sales tracking</text>
      <text x="14" y="167">▸ Production data</text>
      <text x="14" y="180">▸ Impact metrics</text>
    </g>

    <!-- Connector line -->
    <line x1="100" y1="188" x2="100" y2="218" stroke="#16a34a" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
    <circle cx="100" cy="218" r="3" fill="#16a34a" opacity="0.6"/>

    <!-- Impact Report -->
    <rect x="0" y="220" width="200" height="78" rx="8" fill="#0a1e0e" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="220" width="200" height="28" rx="8" fill="#1a6334"/>
    <rect x="0" y="234" width="200" height="14" fill="#1a6334"/>
    <text x="100" y="240" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10" font-weight="700">Impact Report</text>
    <g font-family="monospace" font-size="8" fill="#4ade80">
      <text x="14" y="264">▸ Economic impact</text>
      <text x="14" y="277">▸ Women empowerment</text>
      <text x="14" y="290">▸ Conservation evidence</text>
    </g>

    <!-- Label -->
    <text x="100" y="318" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10" font-weight="600">MONITORING STACK</text>
  </g>

  <!-- Connection line center → right -->
  <line x1="820" y1="315" x2="878" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="875,285 886,290 878,298" fill="#22c55e" opacity="0.5"/>

  <!-- ===== BOTTOM PILLARS ===== -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="140" height="52" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="700">🌿 Conservation</text>
    <text x="70" y="40" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">Mangrove protection</text>
  </g>
  <g transform="translate(370, 480)">
    <rect x="0" y="0" width="140" height="52" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="700">👩 Empowerment</text>
    <text x="70" y="40" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">Women-led business</text>
  </g>
  <g transform="translate(540, 480)">
    <rect x="0" y="0" width="140" height="52" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="700">💰 Livelihoods</text>
    <text x="70" y="40" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">Alternative income</text>
  </g>
  <g transform="translate(710, 480)">
    <rect x="0" y="0" width="140" height="52" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
    <text x="70" y="24" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="700">📊 Evidence</text>
    <text x="70" y="40" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="8">Quantifiable impact</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="590" text-anchor="middle" fill="#16a34a" font-family="monospace" font-size="10" opacity="0.45" letter-spacing="2">NORTH SUMATRA · COOPERATIVE DEVELOPMENT · KOBOTOOLBOX · AIRTABLE</text>
</svg>
