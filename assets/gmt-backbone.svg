<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a7a6f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#0d9488" stroke-width="0.4" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Connection lines between nodes -->
  <!-- Field → Central Hub -->
  <line x1="220" y1="200" x2="540" y2="315" stroke="#0d9488" stroke-width="2" opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Satellite → Central Hub -->
  <line x1="220" y1="430" x2="540" y2="315" stroke="#0d9488" stroke-width="2" opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Central Hub → Reporting -->
  <line x1="660" y1="315" x2="870" y2="200" stroke="#14b8a6" stroke-width="2.5" opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Central Hub → Carbon Credits -->
  <line x1="660" y1="315" x2="870" y2="430" stroke="#14b8a6" stroke-width="2.5" opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Reporting → Dashboard -->
  <line x1="970" y1="200" x2="1070" y2="270" stroke="#14b8a6" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Carbon → Dashboard -->
  <line x1="970" y1="430" x2="1070" y2="360" stroke="#14b8a6" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Animated data packets on lines -->
  <circle r="4" fill="#5eead4" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M220,200 L540,315"/>
  </circle>
  <circle r="4" fill="#5eead4" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M220,430 L540,315"/>
  </circle>
  <circle r="4" fill="#2dd4bf" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M660,315 L870,200"/>
  </circle>
  <circle r="4" fill="#2dd4bf" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M660,315 L870,430"/>
  </circle>

  <!-- ===== NODE 1: Field Data (left top) ===== -->
  <g transform="translate(120, 200)" filter="url(#glow)">
    <!-- DB cylinder body -->
    <ellipse cx="50" cy="16" rx="50" ry="14" fill="#0d9488" opacity="0.9"/>
    <rect x="0" y="16" width="100" height="60" fill="url(#nodeGrad)" opacity="0.9"/>
    <ellipse cx="50" cy="76" rx="50" ry="14" fill="#0a7a6f" opacity="0.9"/>
    <!-- Stripe -->
    <rect x="0" y="28" width="100" height="4" fill="#14b8a6" opacity="0.4"/>
    <rect x="0" y="40" width="100" height="4" fill="#14b8a6" opacity="0.3"/>
    <!-- Label -->
    <text x="50" y="108" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="11" font-weight="600">FIELD DATA</text>
    <text x="50" y="122" text-anchor="middle" fill="#99f6e4" font-family="monospace" font-size="9" opacity="0.7">KoboToolbox</text>
  </g>

  <!-- ===== NODE 2: Satellite Data (left bottom) ===== -->
  <g transform="translate(120, 400)" filter="url(#glow)">
    <ellipse cx="50" cy="16" rx="50" ry="14" fill="#0d9488" opacity="0.85"/>
    <rect x="0" y="16" width="100" height="60" fill="url(#nodeGrad)" opacity="0.85"/>
    <ellipse cx="50" cy="76" rx="50" ry="14" fill="#0a7a6f" opacity="0.85"/>
    <rect x="0" y="28" width="100" height="4" fill="#14b8a6" opacity="0.4"/>
    <rect x="0" y="40" width="100" height="4" fill="#14b8a6" opacity="0.3"/>
    <!-- Satellite icon hint -->
    <text x="50" y="108" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="11" font-weight="600">SATELLITE</text>
    <text x="50" y="122" text-anchor="middle" fill="#99f6e4" font-family="monospace" font-size="9" opacity="0.7">Remote Sensing</text>
  </g>

  <!-- ===== CENTRAL HUB: Google Cloud Platform ===== -->
  <g transform="translate(480, 255)">
    <!-- Glow circle background -->
    <circle cx="100" cy="60" r="80" fill="#0d9488" opacity="0.08"/>
    <circle cx="100" cy="60" r="60" fill="#0d9488" opacity="0.12"/>
    <!-- Main DB (larger) -->
    <ellipse cx="100" cy="20" rx="70" ry="18" fill="#14b8a6" opacity="0.95" filter="url(#glow)"/>
    <rect x="30" y="20" width="140" height="80" fill="url(#nodeGrad2)" opacity="0.95"/>
    <ellipse cx="100" cy="100" rx="70" ry="18" fill="#0d9488" opacity="0.95"/>
    <!-- Stripes -->
    <rect x="30" y="35" width="140" height="5" fill="#5eead4" opacity="0.4"/>
    <rect x="30" y="50" width="140" height="5" fill="#5eead4" opacity="0.3"/>
    <rect x="30" y="65" width="140" height="5" fill="#5eead4" opacity="0.2"/>
    <!-- Label -->
    <text x="100" y="135" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="13" font-weight="700">DATA BACKBONE</text>
    <text x="100" y="151" text-anchor="middle" fill="#99f6e4" font-family="monospace" font-size="10" opacity="0.8">Google Cloud Platform</text>
  </g>

  <!-- ===== NODE 3: Reporting Layer (right top) ===== -->
  <g transform="translate(820, 155)" filter="url(#glow)">
    <ellipse cx="50" cy="16" rx="50" ry="14" fill="#0d9488" opacity="0.9"/>
    <rect x="0" y="16" width="100" height="60" fill="url(#nodeGrad)" opacity="0.9"/>
    <ellipse cx="50" cy="76" rx="50" ry="14" fill="#0a7a6f" opacity="0.9"/>
    <rect x="0" y="28" width="100" height="4" fill="#14b8a6" opacity="0.4"/>
    <rect x="0" y="40" width="100" height="4" fill="#14b8a6" opacity="0.3"/>
    <text x="50" y="108" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="11" font-weight="600">REPORTING</text>
    <text x="50" y="122" text-anchor="middle" fill="#99f6e4" font-family="monospace" font-size="9" opacity="0.7">Dashboards</text>
  </g>

  <!-- ===== NODE 4: Carbon Credits (right bottom) ===== -->
  <g transform="translate(820, 395)" filter="url(#glow)">
    <ellipse cx="50" cy="16" rx="50" ry="14" fill="#0d9488" opacity="0.9"/>
    <rect x="0" y="16" width="100" height="60" fill="url(#nodeGrad)" opacity="0.9"/>
    <ellipse cx="50" cy="76" rx="50" ry="14" fill="#0a7a6f" opacity="0.9"/>
    <rect x="0" y="28" width="100" height="4" fill="#14b8a6" opacity="0.4"/>
    <rect x="0" y="40" width="100" height="4" fill="#14b8a6" opacity="0.3"/>
    <text x="50" y="108" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="11" font-weight="600">CARBON CREDITS</text>
    <text x="50" y="122" text-anchor="middle" fill="#99f6e4" font-family="monospace" font-size="9" opacity="0.7">MRV Data</text>
  </g>

  <!-- ===== Output/Dashboard node (far right) ===== -->
  <g transform="translate(1035, 280)">
    <rect x="0" y="0" width="90" height="90" rx="12" fill="#0d9488" opacity="0.25" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Monitor icon -->
    <rect x="15" y="15" width="60" height="40" rx="4" fill="#14b8a6" opacity="0.7"/>
    <rect x="25" y="22" width="40" height="26" rx="2" fill="#0c1f1e" opacity="0.8"/>
    <!-- Screen content bars -->
    <rect x="28" y="26" width="20" height="3" rx="1" fill="#5eead4" opacity="0.8"/>
    <rect x="28" y="32" width="30" height="2" rx="1" fill="#5eead4" opacity="0.5"/>
    <rect x="28" y="37" width="24" height="2" rx="1" fill="#5eead4" opacity="0.4"/>
    <rect x="28" y="42" width="28" height="2" rx="1" fill="#5eead4" opacity="0.3"/>
    <!-- Stand -->
    <rect x="40" y="55" width="10" height="10" fill="#14b8a6" opacity="0.5"/>
    <rect x="32" y="65" width="26" height="4" rx="2" fill="#14b8a6" opacity="0.5"/>
    <text x="45" y="85" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="9" opacity="0.7">OUTPUT</text>
  </g>

  <!-- Floating label top -->
  <text x="600" y="55" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="14" opacity="0.4" letter-spacing="4">DATA INFRASTRUCTURE · GLOBAL MANGROVE TRUST</text>

  <!-- Bottom label -->
  <text x="600" y="590" text-anchor="middle" fill="#0d9488" font-family="monospace" font-size="11" opacity="0.5" letter-spacing="2">FIELD OPS · SATELLITE · CLOUD · REPORTING · CARBON MRV</text>
</svg>
