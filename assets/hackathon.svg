<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="aiCore" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#334155" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== LEFT: DATA INPUT PANEL ===== -->
  <g filter="url(#panelShadow)">
    <rect x="60" y="140" width="280" height="350" rx="12" fill="url(#panelGrad)" stroke="#334155" stroke-width="1"/>
  </g>
  <!-- Panel header -->
  <rect x="60" y="140" width="280" height="42" rx="12" fill="#1e293b"/>
  <rect x="60" y="162" width="280" height="20" fill="#1e293b"/>
  <circle cx="85" cy="161" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="103" cy="161" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="121" cy="161" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="165" y="166" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">dataset.csv</text>

  <!-- CSV rows -->
  <g font-family="monospace" font-size="10" fill="#64748b">
    <!-- Header row -->
    <rect x="72" y="194" width="256" height="18" rx="3" fill="#1e3a5f" opacity="0.6"/>
    <text x="82" y="207" fill="#60a5fa" font-weight="700">date</text>
    <text x="142" y="207" fill="#60a5fa" font-weight="700">revenue</text>
    <text x="222" y="207" fill="#60a5fa" font-weight="700">growth</text>
    <!-- Data rows -->
    <text x="82" y="226" fill="#94a3b8">Jan 25</text><text x="142" y="226" fill="#34d399">84,200</text><text x="222" y="226" fill="#34d399">+12.3%</text>
    <text x="82" y="244" fill="#94a3b8">Feb 25</text><text x="142" y="244" fill="#34d399">91,400</text><text x="222" y="244" fill="#34d399">+8.6%</text>
    <text x="82" y="262" fill="#94a3b8">Mar 25</text><text x="142" y="262" fill="#34d399">98,100</text><text x="222" y="262" fill="#34d399">+7.3%</text>
    <text x="82" y="280" fill="#94a3b8">Apr 25</text><text x="142" y="280" fill="#fbbf24">89,700</text><text x="222" y="280" fill="#ef4444">-8.6%</text>
    <text x="82" y="298" fill="#94a3b8">May 25</text><text x="142" y="298" fill="#34d399">107,200</text><text x="222" y="298" fill="#34d399">+19.5%</text>
    <text x="82" y="316" fill="#94a3b8">Jun 25</text><text x="142" y="316" fill="#34d399">115,800</text><text x="222" y="316" fill="#34d399">+8.0%</text>
    <text x="82" y="334" fill="#94a3b8">Jul 25</text><text x="142" y="334" fill="#34d399">124,300</text><text x="222" y="334" fill="#34d399">+7.3%</text>
    <!-- Fade lines -->
    <rect x="72" y="340" width="256" height="30" rx="0" fill="url(#bg)" opacity="0.7"/>
    <text x="82" y="358" fill="#475569" opacity="0.5">···</text>
  </g>

  <!-- Rows total label -->
  <text x="200" y="462" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">12 rows · 8 columns</text>

  <!-- Panel label -->
  <text x="200" y="505" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11" font-weight="600">INPUT DATA</text>

  <!-- ===== ARROW: input → AI ===== -->
  <line x1="340" y1="315" x2="440" y2="315" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="440,309 452,315 440,321" fill="#6366f1" opacity="0.8"/>

  <!-- ===== CENTER: AI CORE ===== -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="52" fill="#312e81" opacity="0.95" filter="url(#glow)"/>
    <!-- Hexagon grid pattern inside -->
    <g opacity="0.3" stroke="#818cf8" stroke-width="0.8" fill="none">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"/>
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9"/>
    </g>
    <!-- AI text -->
    <text x="0" y="-8" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="20" font-weight="800">AI</text>
    <text x="0" y="14" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="9">AGENT</text>

    <!-- Neural dots on ring -->
    <circle cx="0" cy="-90" r="4" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="77.9" cy="-45" r="4" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="77.9" cy="45" r="4" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="0" cy="90" r="4" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="-77.9" cy="45" r="4" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="-77.9" cy="-45" r="4" fill="#6366f1" filter="url(#glow)"/>

    <!-- Lines from ring dots to center -->
    <line x1="0" y1="-90" x2="0" y2="-52" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="77.9" y1="-45" x2="43" y2="-25" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="77.9" y1="45" x2="43" y2="25" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="90" x2="0" y2="52" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="-77.9" y1="45" x2="-43" y2="25" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="-77.9" y1="-45" x2="-43" y2="-25" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>

    <!-- Label -->
    <text x="0" y="130" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11" font-weight="600">PROCESSING</text>
  </g>

  <!-- ===== ARROW: AI → output ===== -->
  <line x1="760" y1="315" x2="856" y2="315" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="856,309 868,315 856,321" fill="#6366f1" opacity="0.8"/>

  <!-- ===== RIGHT: OUTPUT PANEL (Report) ===== -->
  <g filter="url(#panelShadow)">
    <rect x="860" y="120" width="280" height="390" rx="12" fill="url(#panelGrad)" stroke="#334155" stroke-width="1"/>
  </g>
  <!-- Panel header -->
  <rect x="860" y="120" width="280" height="42" rx="12" fill="#1e293b"/>
  <rect x="860" y="142" width="280" height="20" fill="#1e293b"/>
  <circle cx="885" cy="141" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="903" cy="141" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="921" cy="141" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="1005" y="146" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">report.html</text>

  <!-- KPI pills -->
  <rect x="872" y="176" width="80" height="34" rx="6" fill="#0f3460" stroke="#1d4ed8" stroke-width="0.5"/>
  <text x="912" y="191" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9">Revenue</text>
  <text x="912" y="204" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="12" font-weight="700">+18.4%</text>

  <rect x="964" y="176" width="80" height="34" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="0.5"/>
  <text x="1004" y="191" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="9">Growth</text>
  <text x="1004" y="204" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" font-weight="700">↑ Trend</text>

  <rect x="1056" y="176" width="72" height="34" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="1092" y="191" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">Score</text>
  <text x="1092" y="204" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="700">92/100</text>

  <!-- Bar chart -->
  <g transform="translate(872, 225)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="100" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="100" x2="256" y2="100" stroke="#334155" stroke-width="1"/>
    <!-- Bars -->
    <rect x="8" y="55" width="22" height="45" rx="3" fill="url(#barBlue)" opacity="0.85"/>
    <rect x="42" y="35" width="22" height="65" rx="3" fill="url(#barBlue)" opacity="0.85"/>
    <rect x="76" y="28" width="22" height="72" rx="3" fill="url(#barTeal)" opacity="0.85"/>
    <rect x="110" y="45" width="22" height="55" rx="3" fill="url(#barBlue)" opacity="0.85"/>
    <rect x="144" y="18" width="22" height="82" rx="3" fill="url(#barTeal)" opacity="0.85"/>
    <rect x="178" y="10" width="22" height="90" rx="3" fill="url(#barPurple)" opacity="0.85"/>
    <rect x="212" y="15" width="22" height="85" rx="3" fill="url(#barPurple)" opacity="0.85"/>
    <!-- Month labels -->
    <g font-family="monospace" font-size="8" fill="#475569">
      <text x="19" y="112" text-anchor="middle">Jan</text>
      <text x="53" y="112" text-anchor="middle">Feb</text>
      <text x="87" y="112" text-anchor="middle">Mar</text>
      <text x="121" y="112" text-anchor="middle">Apr</text>
      <text x="155" y="112" text-anchor="middle">May</text>
      <text x="189" y="112" text-anchor="middle">Jun</text>
      <text x="223" y="112" text-anchor="middle">Jul</text>
    </g>
  </g>

  <!-- Line chart below -->
  <g transform="translate(872, 368)">
    <line x1="0" y1="55" x2="256" y2="55" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="256" y2="35" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
    <polyline points="10,50 46,38 82,28 118,40 154,18 190,12 226,16" fill="none" stroke="#34d399" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="10" cy="50" r="3" fill="#34d399"/>
    <circle cx="46" cy="38" r="3" fill="#34d399"/>
    <circle cx="82" cy="28" r="3" fill="#34d399"/>
    <circle cx="118" cy="40" r="3" fill="#34d399"/>
    <circle cx="154" cy="18" r="3" fill="#34d399"/>
    <circle cx="190" cy="12" r="3" fill="#34d399" filter="url(#glow)"/>
    <circle cx="226" cy="16" r="3" fill="#34d399"/>
  </g>

  <!-- AI narrative text block -->
  <g font-family="monospace" font-size="9" fill="#475569">
    <text x="872" y="455">▸ Revenue grew 18.4% quarter-over-quarter,</text>
    <text x="872" y="468">  driven by Q2 product expansion...</text>
    <text x="872" y="481">▸ Growth trend remains positive with 92/100</text>
    <text x="872" y="494">  health score across all KPIs.</text>
  </g>

  <!-- Panel label -->
  <text x="1000" y="524" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11" font-weight="600">AI-GENERATED REPORT</text>

  <!-- Top label -->
  <text x="600" y="60" text-anchor="middle" fill="#4f46e5" font-family="monospace" font-size="13" opacity="0.5" letter-spacing="4">AI ANALYST AGENT · MICROSOFT HACK TOGETHER 2025</text>

  <!-- Bottom label -->
  <text x="600" y="590" text-anchor="middle" fill="#334155" font-family="monospace" font-size="10" opacity="0.6" letter-spacing="2">PYTHON · AZURE OPENAI · PANDAS · GPT-4</text>
</svg>
